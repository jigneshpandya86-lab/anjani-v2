name: Send Random Daily FCM Notification

on:
  workflow_dispatch:
  schedule:
    # Runs every hour; job logic decides the random send hour for each UTC day.
    - cron: "0 * * * *"

jobs:
  send_random_fcm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin

      - name: Send FCM at random hour for current day
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FCM_TARGET_TOKEN: ${{ secrets.FCM_TARGET_TOKEN }}
          FCM_TARGET_TOPIC: ${{ secrets.FCM_TARGET_TOPIC }}
          RANDOM_SEED: ${{ secrets.RANDOM_SEED }}
          NOTIFICATION_TITLE: ${{ secrets.NOTIFICATION_TITLE }}
          NOTIFICATION_BODY: ${{ secrets.NOTIFICATION_BODY }}
        run: |
          node --input-type=module <<'EOF'
          import crypto from "node:crypto";
          import process from "node:process";
          import admin from "firebase-admin";

          const now = new Date();
          const utcDate = now.toISOString().slice(0, 10); // YYYY-MM-DD
          const currentUtcHour = now.getUTCHours();
          const seed = process.env.RANDOM_SEED || "anjani-random-seed";
          const hashHex = crypto
            .createHash("sha256")
            .update(`${seed}:${utcDate}`)
            .digest("hex");
          const targetUtcHour = parseInt(hashHex.slice(0, 8), 16) % 24;

          console.log(`UTC date=${utcDate}, currentUtcHour=${currentUtcHour}, targetUtcHour=${targetUtcHour}`);

          if (currentUtcHour !== targetUtcHour) {
            console.log("Not the random hour for today. Skipping send.");
            process.exit(0);
          }

          const serviceAccountJson = process.env.FIREBASE_SERVICE_ACCOUNT_JSON;
          const projectId = process.env.FIREBASE_PROJECT_ID;
          const token = process.env.FCM_TARGET_TOKEN;
          const topic = process.env.FCM_TARGET_TOPIC;

          if (!serviceAccountJson) {
            throw new Error("Missing FIREBASE_SERVICE_ACCOUNT_JSON secret.");
          }
          if (!projectId) {
            throw new Error("Missing FIREBASE_PROJECT_ID secret.");
          }
          if (!token && !topic) {
            throw new Error("Set either FCM_TARGET_TOKEN or FCM_TARGET_TOPIC secret.");
          }

          const serviceAccount = JSON.parse(serviceAccountJson);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            projectId,
          });

          const title = process.env.NOTIFICATION_TITLE || "Anjani Update";
          const body = process.env.NOTIFICATION_BODY || "This is your random daily notification.";

          const message = {
            notification: { title, body },
            android: {
              priority: "high",
              notification: {
                channelId: "general",
              },
            },
            data: {
              utcDate,
              sentAt: now.toISOString(),
            },
            ...(token ? { token } : { topic }),
          };

          const id = await admin.messaging().send(message);
          console.log(`FCM sent successfully: ${id}`);
          EOF
