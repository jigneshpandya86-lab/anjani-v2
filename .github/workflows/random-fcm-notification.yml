name: Send Random FCM Notification

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    name: Send Random Notification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install firebase-admin (for notification script)
        run: npm install firebase-admin --no-save

      - name: Verify Firebase credentials
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "❌ Error: FIREBASE_PROJECT_ID secret is not set"
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_KEY" ]; then
            echo "❌ Error: FIREBASE_SERVICE_ACCOUNT_KEY secret is not set"
            exit 1
          fi
          echo "✅ Firebase credentials are configured"

      - name: Send random notification
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/send-random-notification.js
