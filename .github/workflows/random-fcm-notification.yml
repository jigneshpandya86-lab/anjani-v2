name: Send Random Daily FCM Notification

on:
  workflow_dispatch:
  schedule:
    # Runs every hour; job logic decides the random send hour for each UTC day.
    - cron: "0 * * * *"

jobs:
  send_random_fcm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin

      - name: Send FCM at random hour for current day
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FCM_TARGET_TOKEN: ${{ secrets.FCM_TARGET_TOKEN }}
          FCM_TARGET_TOPIC: ${{ secrets.FCM_TARGET_TOPIC }}
          RANDOM_SEED: ${{ secrets.RANDOM_SEED }}
          LOCAL_TIMEZONE: ${{ secrets.LOCAL_TIMEZONE }}
          DAY_START_HOUR: ${{ secrets.DAY_START_HOUR }}
          DAY_END_HOUR: ${{ secrets.DAY_END_HOUR }}
          NOTIFICATION_TITLE: ${{ secrets.NOTIFICATION_TITLE }}
          NOTIFICATION_BODY: ${{ secrets.NOTIFICATION_BODY }}
        run: |
          node --input-type=module <<'EOF'
          import crypto from "node:crypto";
          import process from "node:process";
          import admin from "firebase-admin";

          const now = new Date();
          const timezone = process.env.LOCAL_TIMEZONE || "Asia/Kolkata";
          const startHour = Number.parseInt(process.env.DAY_START_HOUR || "7", 10);
          const endHour = Number.parseInt(process.env.DAY_END_HOUR || "22", 10);
          if (!Number.isInteger(startHour) || !Number.isInteger(endHour) || startHour < 0 || endHour > 23 || startHour > endHour) {
            throw new Error("Invalid DAY_START_HOUR/DAY_END_HOUR. Expected 0-23 and start <= end.");
          }

          const dateFormatter = new Intl.DateTimeFormat("en-CA", {
            timeZone: timezone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          });
          const hourFormatter = new Intl.DateTimeFormat("en-US", {
            timeZone: timezone,
            hour: "2-digit",
            hour12: false,
          });
          const localDate = dateFormatter.format(now); // YYYY-MM-DD in selected timezone
          const currentLocalHour = Number.parseInt(hourFormatter.format(now), 10);

          const seed = process.env.RANDOM_SEED || "anjani-random-seed";
          const hashHex = crypto
            .createHash("sha256")
            .update(`${seed}:${localDate}`)
            .digest("hex");
          const daytimeRange = endHour - startHour + 1;
          const targetLocalHour = startHour + (parseInt(hashHex.slice(0, 8), 16) % daytimeRange);
          const actionIndex = parseInt(hashHex.slice(8, 16), 16);

          console.log(
            `timezone=${timezone}, localDate=${localDate}, currentLocalHour=${currentLocalHour}, targetLocalHour=${targetLocalHour}, dayWindow=${startHour}-${endHour}`
          );

          if (currentLocalHour !== targetLocalHour) {
            console.log("Not the random daytime hour for today. Skipping send.");
            process.exit(0);
          }

          const serviceAccountJson = process.env.FIREBASE_SERVICE_ACCOUNT_JSON;
          const projectId = process.env.FIREBASE_PROJECT_ID;
          const token = process.env.FCM_TARGET_TOKEN;
          const topic = process.env.FCM_TARGET_TOPIC;

          if (!serviceAccountJson) {
            throw new Error("Missing FIREBASE_SERVICE_ACCOUNT_JSON secret.");
          }
          if (!projectId) {
            throw new Error("Missing FIREBASE_PROJECT_ID secret.");
          }
          if (!token && !topic) {
            throw new Error("Set either FCM_TARGET_TOKEN or FCM_TARGET_TOPIC secret.");
          }

          const serviceAccount = JSON.parse(serviceAccountJson);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            projectId,
          });

          const actionTexts = [
            "Please ask pending clients for payment today.",
            "Please check current stock and update low items.",
            "Send welcome leads SMS to newly added leads.",
            "Follow up with clients who missed last payment.",
            "Review today's order list and confirm deliveries.",
            "Call top clients and collect outstanding amounts.",
            "Check warehouse stock movement and reconcile entries.",
            "Send lead follow-up messages for hot prospects.",
          ];
          const autoActionBody = actionTexts[actionIndex % actionTexts.length];
          const title = process.env.NOTIFICATION_TITLE || "Today's Action Reminder";
          const body = process.env.NOTIFICATION_BODY || autoActionBody;

          const message = {
            notification: { title, body },
            android: {
              priority: "high",
              notification: {
                channelId: "general",
              },
            },
            data: {
              localDate,
              sentAt: now.toISOString(),
            },
            ...(token ? { token } : { topic }),
          };

          const id = await admin.messaging().send(message);
          console.log(`FCM sent successfully: ${id}`);
          EOF
