name: Deploy Cloud Functions

on:
  push:
    branches:
      - claude/audit-background-sms-ihAe5
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd functions
          npm install
          cd ..

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions
        run: |
          # Write service account key to temporary file
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > /tmp/serviceAccountKey.json

          # Deploy using service account
          firebase deploy \
            --only functions \
            --project anjaniappnew \
            --non-interactive
        env:
          NODE_ENV: production
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccountKey.json

      - name: Deployment Success
        run: |
          echo "✅ Cloud Functions deployed successfully!"
          echo ""
          echo "Deployed functions:"
          echo "  ✓ smsDeliveryWebhook"
          echo "  ✓ processStaleSmsJobs"
          echo "  ✓ processSmsJobsScheduled"
          echo "  ✓ cleanupSmsProcessingQueue"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Cloud Functions deployment failed!"
          echo "Check the logs above for details."
          exit 1

