name: Build Android APK (Capacitor)
# Cache buster: 2026-04-18
#
# REQUIRED GITHUB SECRETS (set in Repository Settings → Secrets and variables → Actions):
#   - FIREBASE_API_KEY: Get from Firebase Console → Project Settings
#   - FIREBASE_AUTH_DOMAIN: Get from Firebase Console → Project Settings
#   - FIREBASE_PROJECT_ID: Get from Firebase Console → Project Settings
#   - FIREBASE_STORAGE_BUCKET: Get from Firebase Console → Project Settings
#   - FIREBASE_MESSAGING_SENDER_ID: Get from Firebase Console → Project Settings
#   - FIREBASE_APP_ID: Get from Firebase Console → Project Settings
#   - VITE_FIREBASE_VAPID_KEY: Get from Firebase Console → Cloud Messaging
#   - VITE_GOOGLE_MAPS_API_KEY: Get from Google Cloud Console
#   - VITE_MACRO_URL: MacroDroid webhook (optional)
#   - VITE_BUSINESS_WHATSAPP_NUMBER: WhatsApp number (optional)
#
# Without these secrets, the APK will build but show a blank app with no data.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'native/android/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/android-apk.yml'

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Capacitor tooling
        run: npm install --no-save @capacitor/core @capacitor/cli @capacitor/android

      - name: Create .env file from secrets
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_MACRO_URL=${{ secrets.VITE_MACRO_URL }}
          VITE_BUSINESS_WHATSAPP_NUMBER=${{ secrets.VITE_BUSINESS_WHATSAPP_NUMBER }}
          EOF
          echo "✅ .env file created with Firebase credentials"
          echo "📋 Environment variables loaded:"
          grep -E "FIREBASE|GOOGLE_MAPS" .env | sed 's/=.*/=***REDACTED***/g'

      - name: Validate critical Firebase environment variables
        run: |
          MISSING_VARS=()

          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            MISSING_VARS+=("FIREBASE_API_KEY")
          fi

          if [ -z "${{ secrets.FIREBASE_AUTH_DOMAIN }}" ]; then
            MISSING_VARS+=("FIREBASE_AUTH_DOMAIN")
          fi

          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            MISSING_VARS+=("FIREBASE_PROJECT_ID")
          fi

          if [ -z "${{ secrets.FIREBASE_APP_ID }}" ]; then
            MISSING_VARS+=("FIREBASE_APP_ID")
          fi

          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "❌ ERROR: Missing critical Firebase environment variables:"
            printf '%s\n' "${MISSING_VARS[@]}"
            echo ""
            echo "📝 Please configure these secrets in GitHub:"
            echo "   Repository Settings → Secrets and variables → Actions"
            echo ""
            echo "🔗 Get Firebase credentials from:"
            echo "   Firebase Console → Project Settings → Your apps"
            exit 1
          fi

          echo "✅ All critical Firebase variables are configured"
          echo "✅ APK will have access to Firebase data"

      - name: Build web app
        run: npm run build

      - name: Initialize Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create missing kotlin-alignment.init.gradle
        run: |
          FILE="android/kotlin-alignment.init.gradle"
          if [ ! -f "$FILE" ]; then
            cat > "$FILE" << 'EOF'
          // Auto-generated: aligns all Kotlin stdlib transitive dependencies to one version
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion "1.9.24"
                      }
                  }
              }
          }
          EOF
            echo "Created $FILE"
          else
            echo "$FILE already exists, skipping"
          fi

      - name: Ensure Android permissions (File, Camera, Location, Notifications)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          add_permission() {
            local permission="$1"
            if ! grep -q "$permission" "$MANIFEST"; then
              sed -i '/<application/i \    <uses-permission android:name="'"$permission"'" />' "$MANIFEST"
            fi
          }

          # Camera
          add_permission "android.permission.CAMERA"

          # Location
          add_permission "android.permission.ACCESS_COARSE_LOCATION"
          add_permission "android.permission.ACCESS_FINE_LOCATION"

          # File / Storage (pre-Android 13)
          add_permission "android.permission.READ_EXTERNAL_STORAGE"
          add_permission "android.permission.WRITE_EXTERNAL_STORAGE"

          # File / Storage (Android 13+)
          add_permission "android.permission.READ_MEDIA_IMAGES"
          add_permission "android.permission.READ_MEDIA_VIDEO"
          add_permission "android.permission.READ_MEDIA_AUDIO"

          # Notifications (Android 13+)
          add_permission "android.permission.POST_NOTIFICATIONS"
          add_permission "android.permission.VIBRATE"
          add_permission "android.permission.RECEIVE_BOOT_COMPLETED"

          echo "Updated permissions in $MANIFEST"

      - name: Build debug APK
        working-directory: android
        run: |
          echo "🔨 Building Android APK..."
          ./gradlew -I kotlin-alignment.init.gradle assembleDebug
          echo "✅ APK build completed"

      - name: Verify APK file
        run: |
          APK_FILE="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_FILE" ]; then
            SIZE=$(du -sh "$APK_FILE" | cut -f1)
            echo "✅ APK file created successfully"
            echo "📦 File size: $SIZE"
            echo "📁 Path: $APK_FILE"
          else
            echo "❌ APK file not found!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "🎉 Android APK Build Completed Successfully!"
          echo ""
          echo "📦 Artifact Details:"
          echo "  - Name: app-debug-apk"
          echo "  - Location: android/app/build/outputs/apk/debug/app-debug.apk"
          echo "  - Retention: 30 days"
          echo ""
          echo "✅ Firebase Configuration Loaded"
          echo "✅ ESLint Validation Passed"
          echo "✅ Web App Built"
          echo "✅ Capacitor Synced"
          echo "✅ APK Generated"
          echo ""
          echo "📥 Download APK from: Actions → Build Android APK → Artifacts"
