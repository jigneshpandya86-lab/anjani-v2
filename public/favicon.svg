<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Linear Gradient for Droplet Base -->
  <linearGradient id="dropletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8" />   <!-- sky-400 -->
    <stop offset="100%" stop-color="#0284c7" />  <!-- sky-600 -->
  </linearGradient>

  <!-- Linear Gradient for Droplet Reflection -->
  <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
  </linearGradient>

  <!-- Main Droplet Path -->
  <path d="M50 12 
           C66 33, 82 49, 82 67 
           A32 32 0 0 1 18 67 
           C18 49, 34 33, 50 12 Z" 
        fill="url(#dropletGrad)" />

  <!-- Left Side Glossy Reflection (Curve) -->
  <path d="M46 20
           C39 31, 30 43, 27 57
           A23 23 0 0 0 35 76" 
        fill="none" 
        stroke="url(#glowGrad)" 
        stroke-width="5" 
        stroke-linecap="round" />

  <!-- Sparkle/Highlight Dot -->
  <circle cx="68" cy="62" r="5" fill="#ffffff" opacity="0.6" />
</svg>